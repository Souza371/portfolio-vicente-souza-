name: 🚀 Update Portfolio Automatically

on:
  schedule:
    # Atualiza 2 vezes por dia: 8h e 20h (horário UTC)
    - cron: '0 8,20 * * *'
  push:
    branches: [ main ]
  workflow_dispatch: # Permite executar manualmente

permissions:
  contents: write

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
        
    - name: 📊 Fetch GitHub Stats
      uses: actions/github-script@v7
      with:
        script: |
          // Buscar dados do usuário
          const userResponse = await github.rest.users.getByUsername({
            username: 'Souza371'
          });
          
          // Buscar repositórios
          const reposResponse = await github.rest.repos.listForUser({
            username: 'Souza371',
            sort: 'updated',
            per_page: 100
          });
          
          const userData = userResponse.data;
          const repos = reposResponse.data;
          
          // Calcular estatísticas
          const publicRepos = userData.public_repos;
          const totalStars = repos.reduce((sum, repo) => sum + repo.stargazers_count, 0);
          const totalForks = repos.reduce((sum, repo) => sum + repo.forks_count, 0);
          const languages = [...new Set(repos.map(repo => repo.language).filter(Boolean))];
          
          // Criar arquivo JSON com dados atualizados
          const stats = {
            user: {
              login: userData.login,
              name: userData.name,
              bio: userData.bio,
              public_repos: publicRepos,
              followers: userData.followers,
              following: userData.following,
              created_at: userData.created_at,
              updated_at: userData.updated_at
            },
            stats: {
              total_stars: totalStars,
              total_forks: totalForks,
              languages_count: languages.length,
              languages: languages.slice(0, 10)
            },
            repositories: repos.slice(0, 12).map(repo => ({
              name: repo.name,
              description: repo.description,
              html_url: repo.html_url,
              homepage: repo.homepage,
              language: repo.language,
              stargazers_count: repo.stargazers_count,
              forks_count: repo.forks_count,
              updated_at: repo.updated_at,
              topics: repo.topics || []
            })),
            last_updated: new Date().toISOString()
          };
          
          // Salvar no arquivo
          const fs = require('fs');
          fs.writeFileSync('github-data.json', JSON.stringify(stats, null, 2));
          
          console.log('✅ Dados do GitHub atualizados!');
          console.log(`📊 ${publicRepos} repositórios, ${totalStars} stars, ${languages.length} linguagens`);
    
    - name: 🔄 Update HTML with new data
      run: |
        # Atualizar data de última atualização no README
        sed -i "s/Última atualização:.*/Última atualização: $(date +'%d\/%m\/%Y %H:%M')/" README.md || true
        
        echo "📝 Dados atualizados com sucesso a cada 2 horas!"
    
    - name: 📤 Commit and Push Changes
      run: |
        git config --local user.email "vicentedesouza762@gmail.com"
        git config --local user.name "Vicente Souza"
        
        # Verificar se há mudanças
        if git diff --quiet github-data.json README.md; then
          echo "📊 Nenhuma mudança nos dados do GitHub"
        else
          git add github-data.json README.md
          git commit -m "🤖 Auto-update a cada 2h: GitHub data $(date +'%Y-%m-%d %H:%M') - Vicente Souza"
          git push
          echo "✅ Portfolio atualizado automaticamente a cada 2 horas!"
        fi
    
    - name: 📱 Send Notification (opcional)
      if: success()
      run: |
        echo "🎉 Portfolio atualizado com sucesso a cada 2 horas!"
        echo "🔗 Acesse: https://souza371.github.io/portfolio-vicente-souza-/"
        echo "⏰ Próxima atualização em 2 horas!"